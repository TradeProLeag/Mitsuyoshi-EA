<!DOCTYPE html>
<html lang="fr" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITSUYOSHI | L'Algorithme Maître</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --theme-color: #D4AF37;
            --theme-glow: rgba(212, 175, 55, 0.3);
        }

        body {
            background-color: #030305;
            color: #e4e4e7;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .text-theme {
            color: var(--theme-color);
        }

        .border-theme {
            border-color: var(--theme-color);
        }

        .bg-theme {
            background-color: var(--theme-color);
        }

        .shadow-glow {
            box-shadow: 0 0 20px var(--theme-glow);
        }

        .glass-card {
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .animate-in {
            opacity: 0;
            transform: translateY(30px);
        }

        /* Animation de fond */
        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(212, 175, 55, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(212, 175, 55, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-grid"></div>

    <!-- Flyer Container -->
    <div id="flyer"
        class="relative w-full max-w-[400px] aspect-[9/16] glass-card rounded-[40px] overflow-hidden flex flex-col p-8 border-theme/30 shadow-2xl">

        <!-- Header -->
        <div class="animate-in flex flex-col items-center mb-8">
            <img src="icon.png" alt="Logo" class="w-12 h-12 object-contain shadow-glow mb-4">
            <h2 class="text-[10px] font-bold tracking-[0.5em] uppercase text-white">MITSUYOSHI</h2>
            <p class="text-[8px] tracking-[0.3em] uppercase text-theme">Ecosystem</p>
        </div>

        <!-- Main Content -->
        <div class="flex-grow flex flex-col justify-center text-center">
            <h1 class="animate-in text-4xl font-serif italic text-white mb-2 leading-tight">
                L'Algorithme <span class="text-theme">Maître</span>
            </h1>
            <p class="animate-in text-[10px] uppercase tracking-widest text-gray-400 mb-8 px-4 leading-relaxed">
                Dominez les marchés avec une précision mathématique absolue.
            </p>

            <!-- Results Badge -->
            <div class="animate-in glass-card p-6 rounded-2xl mb-8 border-theme/40 relative overflow-hidden group">
                <div
                    class="absolute inset-0 bg-theme/5 scale-x-0 group-hover:scale-x-100 transition-transform origin-left duration-500">
                </div>
                <p class="text-[10px] font-bold uppercase tracking-widest text-theme mb-2">Performance Validée</p>
                <div class="text-6xl font-black text-white tracking-tighter mb-1">+48%</div>
                <p class="text-[10px] uppercase tracking-[0.2em] text-gray-400 font-semibold">Mensuel Moyen</p>
            </div>

            <ul class="animate-in space-y-4 text-left px-4 mb-8">
                <li class="flex items-center gap-3 text-[10px] uppercase tracking-wider text-gray-300">
                    <span class="w-1.5 h-1.5 rounded-full bg-theme shadow-glow"></span>
                    Gestion de Grid Intelligente
                </li>
                <li class="flex items-center gap-3 text-[10px] uppercase tracking-wider text-gray-300">
                    <span class="w-1.5 h-1.5 rounded-full bg-theme shadow-glow"></span>
                    Protection Drawdown Stricte
                </li>
                <li class="flex items-center gap-3 text-[10px] uppercase tracking-wider text-gray-300">
                    <span class="w-1.5 h-1.5 rounded-full bg-theme shadow-glow"></span>
                    Optimisé pour Prop Firm & Perso
                </li>
            </ul>
        </div>

        <!-- Footer / Contact -->
        <div class="animate-in mt-auto pt-6 border-t border-white/10">
            <a href="https://t.me/ysestp" class="flex flex-col items-center group">
                <span
                    class="text-[9px] font-bold uppercase tracking-[0.3em] text-theme mb-3 group-hover:scale-110 transition-transform">Rejoindre
                    l'Elite</span>
                <div
                    class="w-full py-4 bg-theme rounded-xl text-black font-black text-xs uppercase tracking-[0.2em] shadow-glow hover:brightness-110 transition-all flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.13 0 .19z" />
                    </svg>
                    @ysestp
                </div>
            </a>
        </div>
    </div>

    <script>
        window.onload = () => {
            gsap.to(".animate-in", {
                opacity: 1,
                y: 0,
                duration: 1,
                stagger: 0.2,
                ease: "power4.out"
            });
        };
    </script>
</body>

</html>
