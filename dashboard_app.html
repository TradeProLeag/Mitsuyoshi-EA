<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITSUYOSHI | Client Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --theme: #D4AF37;
            --theme-glow: rgba(212, 175, 55, 0.3);
            --bg: #030305;
            --panel: #0a0a0d;
            --text: #e4e4e7;
            --text-dim: #a1a1aa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; font-style: italic; }

        .glass {
            background: rgba(20, 20, 25, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
        }

        .container { max-width: 1300px; margin: 0 auto; padding: 40px 20px; }

        /* Auth Screen */
        .auth-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 3000;
            display: flex; align-items: center; justify-content: center;
        }
        .auth-card { padding: 40px; width: 100%; max-width: 450px; }
        .auth-toggle {
            display: flex; justify-content: center; gap: 20px; margin-bottom: 30px;
        }
        .auth-tab { cursor: pointer; color: var(--text-dim); font-size: 13px; text-transform: uppercase; letter-spacing: 2px; }
        .auth-tab.active { color: var(--theme); font-weight: 700; border-bottom: 2px solid var(--theme); }

        .input-field {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 14px; color: white; margin-bottom: 15px; outline: none;
            transition: 0.3s; font-family: inherit;
        }
        .input-field:focus { border-color: var(--theme); box-shadow: 0 0 15px var(--theme-glow); }

        .btn-theme {
            width: 100%; background: var(--theme); color: black; border: none; padding: 14px;
            border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 2px; font-size: 11px;
        }
        .btn-theme:hover { transform: translateY(-2px); box-shadow: 0 5px 20px var(--theme-glow); }

        /* Dashboard Header */
        .header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px;
        }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }
        .stat-card { padding: 30px; text-align: center; }
        .stat-card label { display: block; font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
        .stat-card .val { font-size: 32px; font-weight: 700; color: var(--theme); }

        /* Tables */
        .table-row {
            display: grid; grid-template-columns: 1fr 1.5fr 1fr 1fr 1fr 1.2fr;
            padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 13px; align-items: center;
        }
        .table-header { color: var(--text-dim); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }

        .profit-plus { color: #00ff88; }
        .profit-minus { color: #ff4444; }

        .btn-timeframe {
            background: transparent; border: 1px solid rgba(255,255,255,0.1); color: var(--text-dim);
            padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 11px; transition: 0.3s;
        }
        .btn-timeframe.active { border-color: var(--theme); color: var(--theme); background: rgba(212, 175, 55, 0.05); }

        /* Settings Panel */
        .settings-panel { padding: 30px; }
        
        .main-grid {
            display: grid; grid-template-columns: 2fr 1fr; gap: 30px; margin-bottom: 40px;
        }

        .table-container { overflow-x: auto; padding-bottom: 10px; }
        
        .table-row {
            display: grid; grid-template-columns: 1fr 1.5fr 1fr 1fr 1fr 1.2fr;
            padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 13px; align-items: center; min-width: 700px;
        }

        #hiddenAdmin {
            position: fixed; bottom: 10px; right: 10px; width: 5px; height: 5px;
            opacity: 0.01; cursor: default;
        }

        @media (max-width: 1024px) {
            .main-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: flex-start; gap: 20px; margin-bottom: 30px; }
            .header > div:last-child { text-align: left; width: 100%; display: flex; justify-content: space-between; align-items: center; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 15px; }
            .stat-card { padding: 20px; }
            .stat-card .val { font-size: 24px; }
            .container { padding: 20px 15px; }
            .glass { border-radius: 12px; }
            h1 { font-size: 28px !important; }
            .auth-card { padding: 25px; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .settings-panel { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="authScreen" class="auth-screen">
        <div class="glass auth-card">
            <div class="auth-toggle">
                <span id="tabLogin" class="auth-tab active" onclick="switchAuth('login')">Login</span>
                <span id="tabSignup" class="auth-tab" onclick="switchAuth('signup')">Sign Up</span>
            </div>

            <!-- Login Form -->
            <div id="formLogin">
                <h2 class="serif" style="font-size: 32px; text-align: center; margin-bottom: 10px;">Welcome Back</h2>
                <p style="text-align: center; color: var(--text-dim); font-size: 12px; margin-bottom: 30px;">Access your trading ecosystem</p>
                <input type="email" id="loginEmail" class="input-field" placeholder="Email Address">
                <input type="password" id="loginPass" class="input-field" placeholder="Password">
                <button class="btn-theme" onclick="handleLogin()">Sign In</button>
                
                <div style="margin-top: 30px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px;">
                    <a href="admin.html" style="color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; opacity: 0.5; transition: 0.3s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.5">Admin Access</a>
                </div>
            </div>

            <!-- Signup Form -->
            <div id="formSignup" style="display: none;">
                <h2 class="serif" style="font-size: 32px; text-align: center; margin-bottom: 10px;">New Account</h2>
                <input type="text" id="signFirst" class="input-field" placeholder="First Name">
                <input type="text" id="signLast" class="input-field" placeholder="Last Name">
                <input type="email" id="signEmail" class="input-field" placeholder="Email Address">
                <input type="password" id="signPass" class="input-field" placeholder="Password">
                <button class="btn-theme" onclick="handleSignup()">Create Account</button>
            </div>
        </div>
    </div>

    <div class="container" id="dashContent" style="display: none;">
        <div class="header">
            <div>
                <h1 style="font-size: 40px;">Trading <span style="color: var(--theme);">Environment</span></h1>
                <p style="color: var(--text-dim); text-transform: uppercase; font-size: 10px; letter-spacing: 4px;">Real-time synchronized terminal</p>
                <div id="accountTabs" style="display: flex; gap: 10px; margin-top: 20px;"></div>
            </div>
            <div style="text-align: right;">
                <span id="userName" style="font-weight: 700; color: var(--theme);">User</span><br>
                <button onclick="logout()" style="background:none; border:none; color:var(--text-dim); font-size: 10px; cursor:pointer; text-transform:uppercase; letter-spacing:1px;">Logout</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="glass stat-card"><label>Account Balance</label><div class="val" id="statBalance">$0</div></div>
            <div class="glass stat-card"><label>Total Net Profit</label><div class="val" id="statProfit">$0</div></div>
            <div class="glass stat-card"><label>Win Rate</label><div class="val" id="statWin">0%</div></div>
            <div class="glass stat-card"><label>Profit Factor</label><div class="val" id="statPF">0.00</div></div>
            <div class="glass stat-card"><label>Last 24h</label><div class="val" id="stat24h">$0</div></div>
        </div>

        <div class="main-grid">
            <div class="glass" style="padding: 30px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                    <h3 class="serif" style="font-size: 24px;">Equity Growth</h3>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-timeframe" onclick="updateTimeframe('1D')">1D</button>
                        <button class="btn-timeframe" onclick="updateTimeframe('1W')">1W</button>
                        <button class="btn-timeframe active" onclick="updateTimeframe('1M')">1M</button>
                        <button class="btn-timeframe" onclick="updateTimeframe('3M')">3M</button>
                    </div>
                </div>
                <div style="height: 400px;"><canvas id="performanceChart"></canvas></div>
            </div>

            <div class="glass settings-panel">
                <h3 class="serif" style="font-size: 24px; margin-bottom: 30px;">Security & Management</h3>
                
                <label style="font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; display: block;">Lot Multiplier</label>
                <div style="display: flex; gap: 10px; margin-bottom: 40px;">
                    <input type="number" id="inputLotMult" class="input-field" style="margin-bottom: 0;" step="0.1" value="1.0">
                    <button class="btn-theme" style="width: auto; padding: 0 25px;" onclick="saveConfig()">Save</button>
                </div>

                <h4 class="serif" style="font-size: 18px; margin-bottom: 20px;">Update Password</h4>
                <input type="password" id="oldPass" class="input-field" placeholder="Old Password">
                <input type="password" id="newPass" class="input-field" placeholder="New Password">
                <button class="btn-theme" onclick="changePassword()">Apply New Password</button>
            </div>
        </div>

        <div class="glass" style="padding: 30px;">
            <h3 class="serif" style="font-size: 24px; margin-bottom: 30px;">Transaction Ledger</h3>
            <div class="table-container">
                <div class="table-header table-row">
                    <span>Ticket</span><span>Close Date</span><span class="hide-mobile">Duration</span><span>Type</span><span>Symbol</span><span style="text-align: right;">Profit</span>
                </div>
                <div id="historyList"></div>
            </div>
            <div style="text-align: center; margin-top: 30px;">
                <button id="btnLoadMore" class="btn-theme" style="width: auto; padding: 10px 40px;" onclick="loadMore()">Load More Data</button>
            </div>
        </div>
    </div>

    <script src="dashboard_logic.js"></script>
</body>
</html>
