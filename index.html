<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MITSUYOSHI EA</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    .font-serif { font-family: 'Bodoni Moda', serif !important; }
    .font-sans { font-family: 'Inter', sans-serif !important; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-fadeIn {
      animation: fadeIn 1.5s ease-out;
    }

    @keyframes aurora {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .bg-aurora {
      background: linear-gradient(-45deg, #07070a, #0d111c, #070a12, #07070a);
      background-size: 400% 400%;
      animation: aurora 20s ease infinite;
    }

    .orb-1 {
      position: fixed;
      top: 10%; left: 10%;
      width: 50vw; height: 50vw;
      background: radial-gradient(circle, rgba(37,99,235,0.03) 0%, transparent 60%);
      border-radius: 50%;
      animation: float 20s infinite ease-in-out;
      pointer-events: none;
      z-index: 0;
    }

    .orb-2 {
      position: fixed;
      bottom: 10%; right: 10%;
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, rgba(59,130,246,0.02) 0%, transparent 60%);
      border-radius: 50%;
      animation: float 25s infinite ease-in-out reverse;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes float {
      0% { transform: translate(0px, 0px) scale(1); }
      33% { transform: translate(30px, -50px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
      100% { transform: translate(0px, 0px) scale(1); }
    }

    .japanese-bg {
      background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: #27272a;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #3b82f6;
      cursor: pointer;
    }
    input[type=range]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #3b82f6;
      cursor: pointer;
      border: none;
    }

    .doc-content {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.5s ease-in-out, opacity 0.5s ease-in-out;
    }
    .doc-content.open {
      max-height: 800px;
      opacity: 1;
    }

    .chevron-icon {
      transition: transform 0.5s;
    }
    .chevron-icon.rotated {
      transform: rotate(180deg);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // Lucide icons as inline SVG components
    const Shield = ({size=24, className=""}) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    );
    const Wind = ({size=24, className=""}) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/>
        <path d="M9.6 4.6A2 2 0 1 1 11 8H2"/>
        <path d="M12.6 19.4A2 2 0 1 0 14 16H2"/>
      </svg>
    );
    const Layers = ({size=24, className=""}) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polygon points="12 2 2 7 12 12 22 7 12 2"/>
        <polyline points="2 17 12 22 22 17"/>
        <polyline points="2 12 12 17 22 12"/>
      </svg>
    );
    const Info = ({size=24, className=""}) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="16" x2="12" y2="12"/>
        <line x1="12" y1="8" x2="12.01" y2="8"/>
      </svg>
    );
    const Zap = ({size=24, className=""}) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    );
    const CheckCircle2 = ({size=24, className=""}) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
        <path d="m9 12 2 2 4-4"/>
      </svg>
    );
    const ChevronDown = ({size=24, className=""}) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    );
    const BookOpen = ({size=24, className=""}) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
    );

    // --- Composants UI Soft ---
    const FadeIn = ({ children }) => (
      <div className="animate-fadeIn">
        {children}
      </div>
    );

    const SectionTitle = ({ subtitle, title }) => (
      <div className="mb-16">
        <span className="text-blue-400 font-medium tracking-widest uppercase text-xs block mb-4 italic" style={{opacity:0.6, letterSpacing:'0.3em'}}>
          {subtitle}
        </span>
        <h2 className="text-4xl md:text-5xl font-serif text-zinc-100 tracking-tight">
          {title}
        </h2>
        <div className="w-12 mt-6" style={{height:'1px', backgroundColor:'rgba(59,130,246,0.5)'}}></div>
      </div>
    );

    // --- Graphique Artificiel (Trading Curve SVG) ---
    const TradingCurveBackground = () => (
      <div className="absolute inset-0 z-10 flex items-end" style={{opacity:0.3}}>
        <svg viewBox="0 0 1000 500" preserveAspectRatio="none" className="w-full" style={{height:'80%',filter:'drop-shadow(0 0 15px rgba(59,130,246,0.3))'}}>
          <defs>
            <linearGradient id="blueGradient" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#3b82f6" stopOpacity="0.5" />
              <stop offset="100%" stopColor="#3b82f6" stopOpacity="0" />
            </linearGradient>
          </defs>
          <path
            d="M 0 500 L 0 450 L 50 440 L 100 460 L 150 380 L 200 400 L 250 320 L 300 340 L 350 260 L 400 280 L 450 200 L 500 220 L 550 150 L 600 170 L 650 100 L 700 120 L 750 60 L 800 80 L 850 30 L 900 40 L 950 10 L 1000 20 L 1000 500 Z"
            fill="url(#blueGradient)"
          />
          <path
            d="M 0 450 L 50 440 L 100 460 L 150 380 L 200 400 L 250 320 L 300 340 L 350 260 L 400 280 L 450 200 L 500 220 L 550 150 L 600 170 L 650 100 L 700 120 L 750 60 L 800 80 L 850 30 L 900 40 L 950 10 L 1000 20"
            fill="none"
            stroke="#3b82f6"
            strokeWidth="2"
            vectorEffect="non-scaling-stroke"
          />
        </svg>
      </div>
    );

    // --- Simulateur de Gains ---
    const ProfitSimulator = () => {
      const [balance, setBalance] = useState(10000);
      const [mode, setMode] = useState('prop');

      const monthlyRate = mode === 'perso' ? 0.50 : 0.05;

      const projection = useMemo(() => {
        let data = [];
        let current = balance;
        for (let i = 0; i <= 6; i++) {
          data.push({ month: i, amount: Math.round(current) });
          current += current * monthlyRate;
        }
        return data;
      }, [balance, monthlyRate]);

      return (
        <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-sm backdrop-blur-sm" style={{backgroundColor:'rgba(24,24,27,0.3)', borderColor:'rgba(63,63,70,0.5)'}}>
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <div>
              <h3 className="text-2xl font-serif mb-6 text-zinc-200">Simulateur de Croissance</h3>
              <div className="space-y-8">
                <div>
                  <label className="block text-xs uppercase tracking-widest text-zinc-500 mb-4 font-bold" style={{letterSpacing:'0.3em'}}>Capital Initial ($)</label>
                  <input
                    type="range"
                    min="1000"
                    max="400000"
                    step="500"
                    value={balance}
                    onChange={(e) => setBalance(parseInt(e.target.value))}
                    className="w-full"
                  />
                  <div className="mt-4 text-3xl font-light text-white font-mono">${balance.toLocaleString()}</div>
                </div>
                <div>
                  <label className="block text-xs uppercase tracking-widest text-zinc-500 mb-4 font-bold" style={{letterSpacing:'0.3em'}}>Stratégie d'Exécution</label>
                  <div className="flex gap-4">
                    <button
                      onClick={() => setMode('prop')}
                      className={`flex-1 py-3 px-4 text-xs font-bold uppercase transition-all border ${mode === 'prop' ? 'bg-zinc-100 text-black border-white' : 'text-zinc-500 border-zinc-800 hover:border-zinc-600'}`}
                      style={{letterSpacing:'0.2em'}}
                    >
                      Prop Firm (Conservateur)
                    </button>
                    <button
                      onClick={() => setMode('perso')}
                      className={`flex-1 py-3 px-4 text-xs font-bold uppercase transition-all border ${mode === 'perso' ? 'bg-zinc-100 text-black border-white' : 'text-zinc-500 border-zinc-800 hover:border-zinc-600'}`}
                      style={{letterSpacing:'0.2em'}}
                    >
                      Compte Perso (Boost)
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <div className="relative">
              <div className="text-zinc-600 uppercase mb-4 flex justify-between" style={{fontSize:'10px', letterSpacing:'0.2em'}}>
                <span>Projection sur 6 mois</span>
                <span className="text-blue-500">+{monthlyRate * 100}% mensuel</span>
              </div>
              <div className="flex items-end gap-2 border-b border-zinc-800 pb-2" style={{height:'12rem'}}>
                {projection.map((d, i) => {
                  const heightPercentage = Math.max(2, (d.amount / projection[6].amount) * 100);
                  return (
                    <div key={i} className="flex-1 flex flex-col items-center group justify-end" style={{height:'100%'}}>
                      <div
                        className="w-full rounded-t-sm transition-all duration-300 ease-in-out"
                        style={{ height: `${heightPercentage}%`, backgroundColor: 'rgba(59,130,246,0.3)' }}
                        onMouseEnter={e => e.currentTarget.style.backgroundColor='rgba(59,130,246,0.6)'}
                        onMouseLeave={e => e.currentTarget.style.backgroundColor='rgba(59,130,246,0.3)'}
                      ></div>
                      <span className="font-mono text-zinc-600 mt-2" style={{fontSize:'8px'}}>M{i}</span>
                    </div>
                  );
                })}
              </div>
              <div className="mt-6 flex justify-between items-center">
                <div>
                  <div className="uppercase text-zinc-500 font-bold" style={{fontSize:'10px', letterSpacing:'0.2em'}}>Total Projeté</div>
                  <div className="text-2xl font-light text-white">${projection[6].amount.toLocaleString()}</div>
                </div>
                <div className="text-right">
                  <div className="uppercase text-zinc-500 font-bold" style={{fontSize:'10px', letterSpacing:'0.2em'}}>Profit Net</div>
                  <div className="text-2xl font-light text-green-400">+${(projection[6].amount - balance).toLocaleString()}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --- App Principal ---
    function App() {
      const [openDoc, setOpenDoc] = useState(null);
      const telegramLink = "https://t.me/ysestp";

      const documentationData = [
        {
          category: "Gestion du Risque (Max Drawdown)",
          params: [
            { name: "MaxDrawdown_Percentage", value: "2 à 4.5%", desc: "Sécurité absolue Prop Firm. Coupe toutes les positions si le seuil de perte défini est atteint." },
            { name: "MaxDrawdown_Amount", value: "Monétaire", desc: "Coupe de sécurité basée sur une somme fixe (ex: perte max de 4500$)." },
            { name: "DailyProfitTarget", value: "Optionnel", desc: "Stoppe l'EA pour la journée une fois l'objectif de gain atteint, évitant l'over-trading." }
          ]
        },
        {
          category: "Filtres Temporels & Calendrier",
          params: [
            { name: "TimeFilter_Days", value: "Lun-Jeu", desc: "Le bot évite nativement le vendredi pour se prémunir des clôtures hebdomadaires et des manipulations." },
            { name: "TimeFilter_Hours", value: "00:00 - 13:59", desc: "Fenêtre de tir millimétrée sur les sessions à plus forte liquidité institutionnelle." }
          ]
        },
        {
          category: "Analyse de Volatilité & Tendance",
          params: [
            { name: "VF_ATR & VF_ADX", value: "Dynamique", desc: "Filtre de Volatilité : S'assure que le marché n'est ni trop plat (choppy), ni en panique incontrôlable avant d'entrer." },
            { name: "HTF_MA_Period", value: "100", desc: "Hard Trend Filter : Vérifie la tendance lourde sur les unités de temps supérieures." },
            { name: "HTF_MinTrendSlopePoints", value: "5.0", desc: "Vérifie l'inclinaison de la tendance. Si la pente est trop faible, l'EA rejette le trade." }
          ]
        },
        {
          category: "Gestion des Positions (Grid & Basket)",
          params: [
            { name: "Basket_LotsSequence", value: "0.10 à 1.80", desc: "Séquence de lots pondérée avec précision. Aucune martingale aveugle, juste un lissage du prix d'entrée." },
            { name: "Grid_ATR_Mult", value: "Dynamique", desc: "L'écartement entre les positions s'adapte à la volatilité réelle (ATR) et non à un nombre de pips fixe." },
            { name: "CTB_BBands", value: "Deviation 2.0", desc: "Rejet de contre-tendance : Bloque les entrées si le prix percute violemment les Bandes de Bollinger." }
          ]
        },
        {
          category: "Sécurisation & Sorties",
          params: [
            { name: "TrailingStop_ATR", value: "Mult 0.95", desc: "Le stop loss suit les gains intelligemment en se basant sur la volatilité en cours." },
            { name: "PartialClose_Part1 & 2", value: "Multi-Paliers", desc: "Encaissement partiel des gains (ex: 35% de la position) à des niveaux clés pour sécuriser le capital." },
            { name: "BreakEven_Points", value: "Activable", desc: "Place automatiquement le trade à l'équilibre dès qu'un certain nombre de points est sécurisé." }
          ]
        }
      ];

      return (
        <div className="min-h-screen text-zinc-300 font-sans bg-aurora relative" style={{scrollBehavior:'smooth', userSelect:'none'}}>
          <div className="orb-1"></div>
          <div className="orb-2"></div>

          {/* Navigation */}
          <nav className="fixed top-0 w-full z-50 px-6 md:px-10 py-6 flex justify-between items-center border-b border-white backdrop-blur-xl shadow-2xl" style={{backgroundColor:'rgba(10,10,11,0.8)', borderColor:'rgba(255,255,255,0.05)'}}>
            <div className="flex items-center gap-3">
              <div className="w-8 h-8 border flex items-center justify-center font-serif text-lg italic text-white" style={{borderColor:'rgba(255,255,255,0.2)', boxShadow:'0 0 15px rgba(255,255,255,0.1)'}}>M</div>
              <span className="text-sm font-bold text-white uppercase" style={{letterSpacing:'0.4em'}}>MITSUYOSHI EA</span>
            </div>
            <div className="hidden md:flex gap-12 font-bold uppercase text-zinc-400" style={{fontSize:'10px', letterSpacing:'0.3em'}}>
              <a href="#stats" className="hover:text-white transition-colors">Performance</a>
              <a href="#technique" className="hover:text-white transition-colors">Architecture</a>
              <a href="#simulateur" className="hover:text-white transition-colors">Projection</a>
              <a href="#documentation" className="hover:text-blue-400 transition-colors">Documentation</a>
            </div>
            <a
              href={telegramLink}
              target="_blank"
              rel="noopener noreferrer"
              className="font-black border px-6 py-2 hover:bg-white hover:text-black transition-all uppercase text-white"
              style={{fontSize:'10px', borderColor:'rgba(255,255,255,0.1)', letterSpacing:'0.2em'}}
            >
              Accès Membre
            </a>
          </nav>

          {/* Hero Section */}
          <header className="relative min-h-screen flex items-center px-6 md:px-10 overflow-hidden japanese-bg">
            <div className="absolute inset-0 w-full h-full pointer-events-none">
              <TradingCurveBackground />
              <div className="absolute inset-0 z-20" style={{background:'linear-gradient(to right, #0a0a0b, rgba(10,10,11,0.8), transparent)'}}></div>
            </div>
            <div className="max-w-4xl relative z-30 pt-20">
              <FadeIn>
                <span className="text-blue-500 font-bold uppercase italic mb-6 block" style={{letterSpacing:'0.5em', fontSize:'12px'}}>L'Art du Trading Algorithmique</span>
                <h1 className="font-serif italic text-white leading-none tracking-tighter mb-10" style={{fontSize:'clamp(4rem,10vw,10rem)', lineHeight:'0.85', textShadow:'0 25px 50px rgba(0,0,0,0.5)'}}>
                  Précision <br /> <span className="text-blue-500">Absolue.</span>
                </h1>
                <p className="text-lg md:text-xl text-zinc-400 font-light leading-relaxed max-w-xl mb-12 italic">
                  L'héritage mathématique de MITSUYOSHI EA. Plus qu'un outil, une infrastructure de gestion de capital testée sur 15 mois de volatilité réelle.
                </p>
                <div className="flex flex-col sm:flex-row items-start sm:items-center gap-10">
                  <a
                    href={telegramLink}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="bg-zinc-100 text-black px-12 py-5 font-bold text-xs uppercase hover:bg-blue-600 hover:text-white transition-all text-center"
                    style={{letterSpacing:'0.2em'}}
                  >
                    Démarrer l'Héritage
                  </a>
                  <div className="flex items-center gap-4 text-zinc-500">
                    <div className="w-12" style={{height:'1px', backgroundColor:'#27272a'}}></div>
                    <span className="font-bold uppercase" style={{fontSize:'10px', letterSpacing:'0.2em'}}>PF 14.07 Validé</span>
                  </div>
                </div>
              </FadeIn>
            </div>
          </header>

          {/* Stats Section */}
          <section id="stats" className="py-32 px-6 md:px-10 border-y border-zinc-900 backdrop-blur-md relative z-20" style={{backgroundColor:'rgba(10,10,11,0.8)'}}>
            <div className="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-16">
              {[
                { num: "14.07", label: "Profit Factor", desc: "Ratio exceptionnel entre gains et pertes brutes sur 1 an." },
                { num: "81%", label: "Taux de Win", desc: "Précision chirurgicale sur plus de 2088 exécutions réelles." },
                { num: "4.3%", label: "Max Drawdown", desc: "Protection du capital prioritaire. Risque millimétré." },
                { num: "+1 AN", label: "Backtest Live", desc: "Échantillon de données massif incluant tous les cycles." },
              ].map((item, i) => (
                <div key={i} className="group">
                  <div className="text-5xl font-serif text-white mb-2 group-hover:text-blue-500 transition-colors">{item.num}</div>
                  <div className="font-bold uppercase text-zinc-500" style={{fontSize:'10px', letterSpacing:'0.3em'}}>{item.label}</div>
                  <p className="mt-4 text-xs text-zinc-600 italic">{item.desc}</p>
                </div>
              ))}
            </div>
          </section>

          {/* Technique Section */}
          <section id="technique" className="py-40 px-6 md:px-10 relative z-20">
            <div className="max-w-7xl mx-auto flex flex-col lg:flex-row gap-24">
              <div className="lg:w-1/2">
                <SectionTitle subtitle="L'Architecture" title="Détails du Système" />
                <div className="space-y-12">
                  <div className="flex gap-6">
                    <div className="mt-1 text-blue-500"><Wind size={24} /></div>
                    <div>
                      <h4 className="text-xl font-serif text-zinc-100 mb-2 italic">Filtrage de Volatilité ATR & ADX</h4>
                      <p className="text-sm leading-relaxed text-zinc-500">
                        Mitsuyoshi analyse la force de la tendance avant chaque entrée. Si l'ADX est inférieur à 25 ou si l'ATR montre une volatilité "bruitée", le système reste en veille. Nous ne tradons que la liquidité réelle.
                      </p>
                    </div>
                  </div>
                  <div className="flex gap-6">
                    <div className="mt-1 text-blue-500"><Layers size={24} /></div>
                    <div>
                      <h4 className="text-xl font-serif text-zinc-100 mb-2 italic">Basket Scaling Intégratif</h4>
                      <p className="text-sm leading-relaxed text-zinc-500">
                        Notre algorithme de gestion de lots (0.10 à 1.80) n'est pas une martingale. C'est une pondération mathématique qui ajuste le prix moyen d'entrée sur des zones institutionnelles clés.
                      </p>
                    </div>
                  </div>
                  <div className="flex gap-6">
                    <div className="mt-1 text-blue-500"><Shield size={24} /></div>
                    <div>
                      <h4 className="text-xl font-serif text-zinc-100 mb-2 italic">Coupe-Circuit Économique</h4>
                      <p className="text-sm leading-relaxed text-zinc-500">
                        Connecté via API aux calendriers économiques, le bot suspend toute activité 30 minutes avant les annonces High-Impact (CPI, NFP, FED) pour éviter les slippages dévastateurs.
                      </p>
                    </div>
                  </div>
                </div>
              </div>

              <div className="lg:w-1/2 rounded-sm backdrop-blur-md p-10" style={{backgroundColor:'rgba(39,39,42,0.4)', border:'1px solid rgba(63,63,70,0.5)'}}>
                <h4 className="font-black uppercase text-zinc-500 mb-10 italic" style={{fontSize:'12px', letterSpacing:'0.4em'}}>Spécifications Intégrales</h4>
                <div className="space-y-6">
                  {[
                    { label: "Plateforme", val: "MetaTrader 5 (MT5)" },
                    { label: "Actifs", val: "XAUUSD, EURUSD, US30" },
                    { label: "Timeframe", val: "M15 (Execution) / H1 (Trend)" },
                    { label: "Type de Trading", val: "Day Trading / Scalping" },
                    { label: "Levier Minimum", val: "1:30 Recommandé" },
                    { label: "Gestion Stop Loss", val: "Trailing ATR Dynamique" },
                    { label: "Prise de Profit", val: "Paliers Partiels (3 Niveaux)" },
                  ].map((item, i) => (
                    <div key={i} className="flex justify-between items-center py-4" style={{borderBottom:'1px solid rgba(63,63,70,0.5)'}}>
                      <span className="font-bold uppercase text-zinc-500" style={{fontSize:'10px', letterSpacing:'0.2em'}}>{item.label}</span>
                      <span className="text-sm text-zinc-200 italic font-medium text-right">{item.val}</span>
                    </div>
                  ))}
                </div>
                <div className="mt-10 p-6 rounded-sm" style={{backgroundColor:'rgba(59,130,246,0.1)', border:'1px solid rgba(59,130,246,0.3)'}}>
                  <div className="flex items-center gap-3 mb-2 text-blue-400">
                    <Info size={16} />
                    <span className="font-bold uppercase" style={{fontSize:'10px', letterSpacing:'0.2em'}}>Note de l'Ingénieur</span>
                  </div>
                  <p className="text-xs italic leading-relaxed text-zinc-400">
                    Le système est optimisé pour les spreads normaux. L'utilisation d'un compte à max 5 pips de spread est impérative pour maintenir le Profit Factor de 14.07.
                  </p>
                </div>
              </div>
            </div>
          </section>

          {/* Simulator Section */}
          <section id="simulateur" className="py-40 px-6 md:px-10 relative z-20" style={{backgroundColor:'rgba(9,9,11,0.5)'}}>
            <div className="max-w-5xl mx-auto">
              <SectionTitle subtitle="Projection" title="Simulateur de Potentiel" />
              <ProfitSimulator />
              <div className="mt-12 grid grid-cols-1 md:grid-cols-2 gap-8">
                <div className="flex items-start gap-4 p-6" style={{border:'1px solid rgba(63,63,70,0.5)', backgroundColor:'rgba(0,0,0,0.2)'}}>
                  <CheckCircle2 className="text-green-500 shrink-0" size={20} />
                  <div>
                    <span className="font-bold uppercase text-zinc-100 block mb-1" style={{fontSize:'10px', letterSpacing:'0.2em'}}>Prop Firm Mode</span>
                    <p className="text-xs text-zinc-500 italic">Objectif de 5% mensuel avec un drawdown maximum de 4%. Idéal pour valider et conserver vos comptes financés sur le long terme.</p>
                  </div>
                </div>
                <div className="flex items-start gap-4 p-6" style={{border:'1px solid rgba(63,63,70,0.5)', backgroundColor:'rgba(0,0,0,0.2)'}}>
                  <Zap className="text-blue-500 shrink-0" size={20} />
                  <div>
                    <span className="font-bold uppercase text-zinc-100 block mb-1" style={{fontSize:'10px', letterSpacing:'0.2em'}}>Personal Boost Mode</span>
                    <p className="text-xs text-zinc-500 italic">Exploitation maximale de la volatilité pour des comptes personnels. Rendements projetés plus élevés avec une exposition contrôlée.</p>
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* Documentation Section */}
          <section id="documentation" className="py-40 px-6 md:px-10 border-t border-zinc-900 backdrop-blur-sm relative z-20" style={{backgroundColor:'rgba(10,10,11,0.8)'}}>
            <div className="max-w-4xl mx-auto">
              <div className="text-center mb-20">
                <BookOpen className="mx-auto text-blue-500 mb-6" size={40} />
                <SectionTitle subtitle="Transparence Totale" title="Documentation MITSUYOSHI EA" />
                <p className="text-zinc-400 italic font-light text-lg">
                  Explorez l'intégralité des paramètres accessibles. Chaque réglage a été pensé pour vous offrir un contrôle institutionnel sur votre algorithme.
                </p>
              </div>
              <div className="space-y-4">
                {documentationData.map((section, index) => (
                  <div key={index} className="rounded-sm overflow-hidden backdrop-blur-md transition-all duration-300" style={{border:'1px solid rgba(63,63,70,0.6)', backgroundColor:'rgba(24,24,27,0.6)'}}>
                    <button
                      onClick={() => setOpenDoc(openDoc === index ? null : index)}
                      className="w-full px-8 py-6 flex justify-between items-center text-left transition-colors hover:bg-zinc-800"
                      style={{backgroundColor: openDoc === index ? 'rgba(39,39,42,0.4)' : 'transparent'}}
                    >
                      <h3 className="text-xl font-serif italic text-zinc-100">{section.category}</h3>
                      <ChevronDown
                        className={`text-zinc-500 chevron-icon ${openDoc === index ? 'rotated' : ''}`}
                      />
                    </button>
                    <div className={`doc-content ${openDoc === index ? 'open' : ''}`}>
                      <div className="px-8 pb-8 space-y-6 pt-4 mx-8" style={{borderTop:'1px solid rgba(63,63,70,0.5)'}}>
                        {section.params.map((param, pIndex) => (
                          <div key={pIndex} className="flex flex-col md:flex-row gap-4 md:gap-10">
                            <div className="md:w-1/3">
                              <div className="text-xs font-bold font-mono text-blue-400 mb-1">{param.name}</div>
                              <div className="uppercase text-zinc-500" style={{fontSize:'10px', letterSpacing:'0.2em'}}>{param.value}</div>
                            </div>
                            <div className="md:w-2/3">
                              <p className="text-sm text-zinc-400 leading-relaxed italic">{param.desc}</p>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* CTA Final */}
          <section className="py-60 px-6 md:px-10 text-center relative overflow-hidden z-20" style={{backgroundColor:'rgba(10,10,11,0.95)'}}>
            <div className="absolute inset-0 flex items-center justify-center pointer-events-none" style={{opacity:0.02}}>
              <div className="font-serif italic uppercase" style={{fontSize:'40vw'}}>Mitsu</div>
            </div>
            <div className="relative z-10 max-w-3xl mx-auto">
              <h2 className="font-serif italic text-white mb-12 tracking-tight leading-none" style={{fontSize:'clamp(3rem,8vw,8rem)'}}>
                Rejoignez <br /> l'Héritage.
              </h2>
              <p className="text-zinc-500 text-lg mb-16 italic font-light">
                Les places sont limitées mensuellement pour garantir un support technique d'exception. Ne laissez plus le hasard guider votre capital.
              </p>
              <div className="flex justify-center">
                <a
                  href={telegramLink}
                  target="_blank"
                  rel="noopener noreferrer"
                  className="px-16 py-6 bg-zinc-100 text-black font-black text-xs uppercase hover:bg-blue-600 hover:text-white transition-all inline-block"
                  style={{letterSpacing:'0.4em', transform:'scale(1)', transition:'all 0.2s'}}
                  onMouseEnter={e => e.currentTarget.style.transform='scale(1.05)'}
                  onMouseLeave={e => e.currentTarget.style.transform='scale(1)'}
                >
                  Obtenir MITSUYOSHI EA
                </a>
              </div>
            </div>
          </section>

          {/* Footer */}
          <footer className="border-t border-zinc-900 relative z-20" style={{height:'8rem', borderColor:'rgba(39,39,42,0.5)', backgroundColor:'transparent'}}>
            <div className="max-w-7xl mx-auto h-full px-10 flex flex-col md:flex-row justify-between items-center gap-10">
              <div className="flex items-center gap-4 transition-opacity" style={{opacity:0.3}}
                onMouseEnter={e => e.currentTarget.style.opacity='1'}
                onMouseLeave={e => e.currentTarget.style.opacity='0.3'}
              >
                <div className="w-8 h-8 border flex items-center justify-center font-serif italic text-white" style={{borderColor:'rgba(255,255,255,0.2)'}}>M</div>
                <span className="font-bold uppercase text-white" style={{fontSize:'10px', letterSpacing:'0.4em'}}>MITSUYOSHI EA</span>
              </div>
              <div className="flex gap-10 font-bold uppercase text-zinc-600" style={{fontSize:'10px', letterSpacing:'0.2em'}}>
              </div>
              <div className="text-zinc-700 italic text-right" style={{fontSize:'10px'}}>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
