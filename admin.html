<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITSUYOSHI | Master Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --theme: #D4AF37;
            --theme-glow: rgba(212, 175, 55, 0.3);
            --bg: #030305;
            --panel: #0a0a0d;
            --text: #e4e4e7;
            --text-dim: #a1a1aa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; font-style: italic; }

        .glass {
            background: rgba(20, 20, 25, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        /* Login */
        .login-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-card { padding: 50px; width: 100%; max-width: 400px; text-align: center; }

        .input-field {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 14px; color: white; margin-bottom: 20px; outline: none;
            transition: 0.3s; font-family: inherit;
        }
        .input-field:focus { border-color: var(--theme); box-shadow: 0 0 15px var(--theme-glow); }

        .btn-theme {
            width: 100%; background: var(--theme); color: black; border: none; padding: 14px;
            border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 2px; font-size: 11px;
        }
        .btn-theme:hover { transform: translateY(-2px); box-shadow: 0 5px 20px var(--theme-glow); }

        /* User List */
        .user-row {
            padding: 20px 30px; margin-bottom: 12px; cursor: pointer; transition: 0.3s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .user-row:hover { border-color: var(--theme); transform: translateX(10px); background: rgba(212, 175, 55, 0.03); }
        .user-row b { font-size: 18px; color: var(--theme); }
        .user-row span { font-size: 13px; color: var(--text-dim); }

        /* Detail View */
        #detailView {
            position: fixed; inset: 0; background: var(--bg); z-index: 1500;
            display: none; flex-direction: column; overflow-y: auto;
        }
        .header-detail {
            padding: 30px 50px; border-bottom: 1px solid rgba(255,255,255,0.05);
            background: var(--panel); display: flex; justify-content: space-between; align-items: center;
        }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }
        .stat-card { padding: 25px; text-align: center; }
        .stat-card label { display: block; font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .stat-card .val { font-size: 28px; font-weight: 700; color: var(--theme); }

        .kill-btn {
            padding: 12px 30px; border-radius: 8px; font-weight: 700; font-size: 11px;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border: none; transition: 0.3s;
        }
        .ks-on { background: #ff4444; color: white; }
        .ks-off { background: #00ff88; color: black; }

        .acc-tab {
            padding: 8px 16px; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
            cursor: pointer; font-size: 12px; transition: 0.3s;
        }
        .acc-tab.active { border-color: var(--theme); color: var(--theme); background: rgba(212, 175, 55, 0.1); }

        /* Responsive */
        @media (max-width: 768px) {
            .header-detail { padding: 20px; flex-direction: column; gap: 20px; text-align: center; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 15px; }
            .stat-card { padding: 15px; }
            .stat-card .val { font-size: 22px; }
            .container { padding: 15px; }
            .user-row { flex-direction: column; align-items: flex-start; gap: 15px; }
            .user-row > div:last-child { width: 100%; justify-content: space-between; }
            h1 { font-size: 28px !important; }
            .login-card { padding: 30px; }
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="loginScreen" class="login-screen">
        <div class="glass login-card">
            <h2 class="serif" style="font-size: 32px; color: var(--theme); margin-bottom: 10px;">Master Key</h2>
            <p style="font-size: 12px; color: var(--text-dim); margin-bottom: 30px; letter-spacing: 3px; text-transform: uppercase;">Administrative Access</p>
            <input type="password" id="adminKey" class="input-field" placeholder="••••••••" style="text-align: center;">
            <button class="btn-theme" onclick="verifyAdmin()">Unlock Terminal</button>
        </div>
    </div>

    <div class="container" id="listView">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 50px;">
            <div>
                <h1 style="font-size: 42px;">Ecosystem <span style="color: var(--theme);">Oversight</span></h1>
                <p style="color: var(--text-dim); text-transform: uppercase; font-size: 10px; letter-spacing: 4px;">Master Administrative Console</p>
            </div>
            <a href="dashboard_app.html" style="color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 1px;">Client Portal →</a>
        </div>
        
        <div id="userGrid"></div>
    </div>

    <div id="detailView">
        <div class="header-detail">
            <div style="display: flex; align-items: center; gap: 30px;">
                <button class="btn-theme" style="width: auto; padding: 10px 20px;" onclick="closeDetail()">← Users</button>
                <div>
                    <h2 id="detName" class="serif" style="font-size: 24px;">Client Name</h2>
                    <p id="detEmail" style="color: var(--text-dim); font-size: 13px;"></p>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <div id="accSelector" style="display: flex; gap: 10px;"></div>
                <button id="btnKill" class="kill-btn" onclick="toggleTrading()"></button>
            </div>
        </div>

        <div class="container">
            <div class="stats-grid">
                <div class="glass stat-card"><label>Balance</label><div class="val" id="statBalance">$0</div></div>
                <div class="glass stat-card"><label>Total Profit</label><div class="val" id="statProfit">$0</div></div>
                <div class="glass stat-card"><label>Win Rate</label><div class="val" id="statWin">0%</div></div>
                <div class="glass stat-card"><label>Profit Factor</label><div class="val" id="statPF">0.00</div></div>
                <div class="glass stat-card"><label>Last 24h</label><div class="val" id="stat24h">$0</div></div>
            </div>

            <div class="glass" style="padding: 30px; margin-bottom: 40px;">
                <h3 class="serif" style="margin-bottom: 25px; font-size: 22px;">Equity Evolution</h3>
                <div style="height: 400px;"><canvas id="performanceChart"></canvas></div>
            </div>

            <div class="glass" style="padding: 30px;">
                <h3 class="serif" style="margin-bottom: 25px; font-size: 22px;">Recent Ledger</h3>
                <div id="ledgerList"></div>
            </div>
        </div>
    </div>

    <script>
        let adminPass = "";
        let masterData = [];
        let activeEmail = "";
        let activeAccId = "";
        let currentChart = null;

        function verifyAdmin() {
            adminPass = document.getElementById('adminKey').value.trim();
            if(!adminPass) return alert("Key required");
            fetchData();
        }

        async function fetchData() {
            try {
                const res = await fetch(`/api/admin/all-data?password=${adminPass}`);
                if (res.status === 403) return alert("Forbidden Access");
                masterData = await res.json();
                document.getElementById('loginScreen').style.display = 'none';
                renderUserList();
                if(activeEmail) openUserDetail(activeEmail);
            } catch (e) { console.error(e); }
        }

        function renderUserList() {
            const grid = document.getElementById('userGrid');
            grid.innerHTML = masterData.map(item => `
                <div class="glass user-row" onclick="openUserDetail('${item.user.email}')">
                    <div>
                        <b>${item.user.fullName}</b><br>
                        <span>${item.user.email}</span>
                    </div>
                    <div style="text-align: right; display: flex; align-items: center; justify-content: flex-end; gap: 20px;">
                        <div>
                            <div style="font-weight: 700; color: var(--theme);">$${item.accounts.reduce((a,b)=>a+(parseFloat(b.balance)||0),0).toLocaleString()}</div>
                            <div style="font-size: 10px; color: ${calculate24hProfit(item.accounts.flatMap(a => a.history)) >= 0 ? '#00ff88' : '#ff4444'}; text-transform: uppercase;">
                                24h: ${calculate24hProfit(item.accounts.flatMap(a => a.history)) >= 0 ? '+' : ''}$${calculate24hProfit(item.accounts.flatMap(a => a.history)).toFixed(2)}
                            </div>
                            <div style="font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-top: 2px;">${item.accounts.length} Accounts</div>
                        </div>
                        <button onclick="deleteUser(event, '${item.user.email}')" style="background: none; border: none; color: #ff4444; font-size: 24px; cursor: pointer; padding: 5px; transition: 0.3s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'" title="Delete User">×</button>
                    </div>
                </div>
            `).join('');
        }

        function openUserDetail(email) {
            activeEmail = email;
            const data = masterData.find(d => d.user.email === email);
            document.getElementById('detName').textContent = data.user.fullName;
            document.getElementById('detEmail').textContent = data.user.email;
            
            const selector = document.getElementById('accSelector');
            selector.innerHTML = data.accounts.map(acc => `
                <div class="acc-tab ${acc.account_id === activeAccId ? 'active' : ''}" onclick="selectAccount('${acc.account_id}')">
                    #${acc.account_id}
                </div>
            `).join('');

            if(!activeAccId || !data.accounts.find(a => a.account_id === activeAccId)) {
                selectAccount(data.accounts[0].account_id);
            } else {
                renderAccount(data.accounts.find(a => a.account_id === activeAccId));
            }
            document.getElementById('detailView').style.display = 'flex';
        }

        function selectAccount(id) { activeAccId = id; openUserDetail(activeEmail); }

        function renderAccount(acc) {
            document.getElementById('statBalance').textContent = '$' + (parseFloat(acc.balance)||0).toLocaleString();
            document.getElementById('statProfit').textContent = (parseFloat(acc.totalResult)>=0?'+':'') + '$' + (parseFloat(acc.totalResult)||0).toLocaleString();
            document.getElementById('statWin').textContent = acc.winRate;
            document.getElementById('statPF').textContent = acc.profitFactor;

            const p24 = calculate24hProfit(acc.history);
            const el24 = document.getElementById('stat24h');
            el24.textContent = (p24 >= 0 ? '+' : '') + '$' + p24.toFixed(2);
            el24.style.color = p24 >= 0 ? '#00ff88' : '#ff4444';

            const btn = document.getElementById('btnKill');
            if(acc.config.enabled) {
                btn.textContent = "Suspend Trading";
                btn.className = "kill-btn ks-on";
            } else {
                btn.textContent = "Resume Trading";
                btn.className = "kill-btn ks-off";
            }
            renderChart(acc.chartData || []);
            renderLedger(acc.history || []);
        }

        function calculate24hProfit(history) {
            const now = new Date();
            const last24h = new Date(now.getTime() - 24 * 60 * 60 * 1000);
            let profit = 0;
            (history || []).forEach(h => {
                const tradeDate = new Date(h.date.replace(/\./g, '/'));
                if (tradeDate >= last24h) {
                    profit += parseFloat(h.resultStr.replace('$', '').replace('+', '')) || 0;
                }
            });
            return profit;
        }

        async function toggleTrading() {
            const userData = masterData.find(d => d.user.email === activeEmail);
            const acc = userData.accounts.find(a => a.account_id === activeAccId);
            const newState = !acc.config.enabled;
            try {
                const res = await fetch('/api/admin/toggle-account', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: adminPass, email: activeEmail, account_id: activeAccId, enabled: newState })
                });
                if(res.ok) fetchData();
            } catch (e) { console.error(e); }
        }

        async function deleteUser(event, email) {
            event.stopPropagation();
            if (!confirm(`Are you sure you want to PERMANENTLY delete user ${email} and all their accounts?`)) return;
            
            try {
                const res = await fetch('/api/admin/delete-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: adminPass, email: email })
                });
                if(res.ok) fetchData();
                else alert("Failed to delete user");
            } catch (e) { console.error(e); }
        }

        function renderChart(points) {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            if(currentChart) currentChart.destroy();
            currentChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: points.map(p => p.x),
                    datasets: [{
                        data: points.map(p => p.y), borderColor: '#D4AF37', borderWidth: 2, tension: 0.3, fill: true,
                        backgroundColor: 'rgba(212, 175, 55, 0.1)', pointRadius: 2
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
                    scales: { y: { grid: { color: 'rgba(255,255,255,0.03)' } }, x: { grid: { display: false } } }
                }
            });
        }

        function renderLedger(history) {
            const list = document.getElementById('ledgerList');
            list.innerHTML = history.slice(0, 10).map(h => `
                <div style="display: grid; grid-template-columns: 1fr 2fr 1fr 1fr 1fr; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px;">
                    <span style="color: var(--theme);">#${h.id}</span>
                    <span>${h.date}</span>
                    <span style="color:${h.type==='BUY'?'#00ff88':'#ff4444'}">${h.type}</span>
                    <span>${h.size}</span>
                    <b style="text-align:right; color:${h.isPositive?'#00ff88':'#ff4444'}">${h.resultStr}</b>
                </div>
            `).join('');
        }

        function closeDetail() { document.getElementById('detailView').style.display = 'none'; activeEmail = ""; activeAccId = ""; }
        setInterval(() => { if(adminPass) fetchData(); }, 15000);
    </script>
</body>
</html>
